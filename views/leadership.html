<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowthOps Year 2 — Leadership Update</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --warning: #eab308;
            --danger: #dc2626;
            --text: #1f2937;
            --muted: #6b7280;
            --bg: #ffffff;
            --border: #e5e7eb;
            --kavya: #2563eb;
            --riya: #16a34a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.6; padding: 2rem;
            max-width: 1200px; margin: 0 auto;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }
        header h1 { font-size: 1.75rem; font-weight: 600; }
        .quarter-badge {
            background: var(--primary); color: white;
            padding: 0.5rem 1rem; border-radius: 2rem; font-weight: 500;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .summary-card {
            background: #f8f9fa; border-radius: 0.75rem;
            padding: 1.5rem; text-align: center;
        }
        .summary-card .value { font-size: 2.5rem; font-weight: 700; color: var(--primary); }
        .summary-card .label { font-size: 0.875rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .summary-card.success .value { color: var(--success); }
        .summary-card.warning .value { color: var(--warning); }
        .summary-card.danger  .value { color: var(--danger); }

        section { margin-bottom: 2rem; }
        section h2 {
            font-size: 1.1rem; margin-bottom: 1rem; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.05em;
        }

        .progress-section { background: #f8f9fa; border-radius: 0.75rem; padding: 1.5rem; }
        .kra-row {
            display: grid;
            grid-template-columns: 260px 1fr 120px;
            align-items: center; gap: 1rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        .kra-row:last-child { border-bottom: none; }
        .kra-name { font-weight: 600; }
        .kra-focus { font-size: 0.875rem; color: var(--muted); }
        .progress-bar { height: 24px; background: #dee2e6; border-radius: 12px; overflow: hidden; }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--primary), #60a5fa);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 0.75rem; color: white; font-size: 0.75rem; font-weight: 600;
            transition: width 0.5s ease;
        }
        .kra-percent { font-size: 1rem; font-weight: 700; text-align: right; }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem; margin-bottom: 2rem;
        }
        .team-card {
            background: #f8f9fa; border-radius: 0.75rem; padding: 1.25rem;
            border-left: 4px solid var(--primary);
        }
        .team-card.kavya { border-left-color: var(--kavya); }
        .team-card.riya  { border-left-color: var(--riya); }
        .team-name { font-weight: 600; font-size: 1rem; }
        .team-role { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.75rem; }
        .team-score { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .team-score-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
        .team-tasks { display: flex; gap: 1rem; margin-top: 0.6rem; font-size: 0.8rem; color: var(--muted); }

        .highlights { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .highlight-card { background: #f8f9fa; border-radius: 0.75rem; padding: 1.5rem; }
        .highlight-card h3 {
            font-size: 1rem; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .highlight-card h3::before {
            content: ""; display: inline-block;
            width: 8px; height: 8px; border-radius: 50%;
        }
        .highlight-card.done h3::before { background: var(--success); }
        .highlight-card.next h3::before { background: var(--primary); }
        .highlight-card.blocked h3::before { background: var(--danger); }
        .highlight-card ul { list-style: none; font-size: 0.9375rem; }
        .highlight-card li { padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
        .highlight-card li:last-child { border-bottom: none; }

        .blockers-section {
            background: #fef2f2; border: 1px solid #fecaca;
            border-radius: 0.75rem; padding: 1rem;
        }
        .blocker-row {
            display: flex; gap: 0.75rem;
            padding: 0.75rem 0; border-bottom: 1px solid #fecaca;
        }
        .blocker-row:first-child { padding-top: 0; }
        .blocker-row:last-child { padding-bottom: 0; border-bottom: none; }
        .blocker-text { color: #991b1b; font-weight: 500; }
        .blocker-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

        footer {
            margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border);
            display: flex; justify-content: space-between;
            color: var(--muted); font-size: 0.875rem;
        }
        .back-link { color: var(--primary); text-decoration: none; }
        .loading { text-align: center; padding: 2rem; color: var(--muted); }

        @media print { body { padding: 0; } .back-link { display: none; } }
        @media (max-width: 768px) {
            .summary-grid, .team-grid { grid-template-columns: repeat(2, 1fr); }
            .highlights { grid-template-columns: 1fr; }
            .kra-row { grid-template-columns: 1fr; gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>GrowthOps Year 2 — Leadership Update</h1>
        <span class="quarter-badge" id="quarter">Q1 Y2 | Apr-Jun 2026</span>
    </header>

    <div id="content">
        <div class="loading">Loading...</div>
    </div>

    <footer>
        <a href="../dashboard.html" class="back-link">Back to Dashboard</a>
        <a href="samadhan-rebuild.html" class="back-link" style="margin-left: 1rem;">Website Rebuild showcase &rarr;</a>
        <span id="last-updated" style="margin-left: auto;">Last updated: -</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js?v=3"></script>
    <script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    // Auth guard: redirect to login if no active session.
    // Several tables (kras, profiles) are RLS-locked to authenticated reads,
    // so the view would render with blanks for anonymous visitors.
    async function checkAuthOrRedirect() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.href = '../index.html?next=views/leadership.html';
            return false;
        }
        return true;
    }

    async function init() {
        if (!(await checkAuthOrRedirect())) return;
        try {
            const [actionsRes, kpisRes, scoresRes, krasRes, workLogsRes, profilesRes] = await Promise.all([
                sb.from('actions').select('*, kras(kra_code, short_name, sort_order), kpis(name, member)').order('action_id'),
                sb.from('kpis').select('*, kras(kra_code, short_name, sort_order)'),
                sb.from('kpi_scores').select('*'),
                sb.from('kras').select('*').order('sort_order'),
                sb.from('work_logs').select('*').gte('log_date',
                    new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]
                ),
                sb.from('profiles').select('id, full_name')
            ]);

            render({
                actions: actionsRes.data || [],
                kpis: kpisRes.data || [],
                scores: scoresRes.data || [],
                kras: krasRes.data || [],
                workLogs: workLogsRes.data || [],
                profiles: profilesRes.data || []
            });
        } catch (error) {
            console.error('Error loading data:', error);
            document.getElementById('content').innerHTML =
                '<div class="loading">Failed to load data. Please refresh.</div>';
        }
    }

    function getLatestScore(scores, kpiId) {
        const currentYear = 2026;
        const match = scores
            .filter(s => s.kpi_id === kpiId && s.year === currentYear)
            .sort((a, b) => b.month - a.month);
        return match.length ? match[0].score : null;
    }

    function memberWeightedScore(kpis, scores, memberId) {
        const memberKpis = kpis.filter(k => k.member === memberId);
        let weightedSum = 0, totalWeight = 0;
        memberKpis.forEach(kpi => {
            const s = getLatestScore(scores, kpi.id);
            if (s !== null) {
                weightedSum += s * kpi.weight;
                totalWeight += kpi.weight;
            }
        });
        return totalWeight === 0 ? null : weightedSum / totalWeight;
    }

    function render({ actions, kpis, scores, kras, workLogs, profiles }) {
        const stats = {
            done: actions.filter(a => a.status === 'done').length,
            progress: actions.filter(a => a.status === 'in_progress').length,
            pending: actions.filter(a => a.status === 'not_started').length,
            total: actions.length
        };

        // KRA progress (5 rows)
        const kraProgress = kras.map(kra => {
            const kraActions = actions.filter(a => a.kras?.kra_code === kra.kra_code);
            const done = kraActions.filter(a => a.status === 'done').length;
            const total = kraActions.length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            return { kra, done, total, pct };
        });

        // Team scores
        const teamScores = APP_CONFIG.team.map(m => {
            const score = memberWeightedScore(kpis, scores, m.id);
            const active = actions.filter(a => a.owner_name === m.id && a.status === 'in_progress').length;
            const pending = actions.filter(a => a.owner_name === m.id && a.status === 'not_started').length;
            const done = actions.filter(a => a.owner_name === m.id && a.status === 'done').length;
            return { m, score, active, pending, done };
        });

        const completed = actions.filter(a => a.status === 'done').slice(0, 6);
        const inProgress = actions.filter(a => a.status === 'in_progress').slice(0, 6);

        // Blockers from work logs
        const blockers = [];
        workLogs.forEach(log => {
            if (Array.isArray(log.blockers) && log.blockers.length) {
                const profile = profiles.find(p => p.id === log.user_id);
                const user = profile?.full_name || 'Team member';
                log.blockers.forEach(b => blockers.push({ text: b, owner: user, date: log.log_date }));
            }
        });

        document.getElementById('content').innerHTML = `
            <div class="summary-grid">
                <div class="summary-card success"><div class="value">${stats.done}</div><div class="label">Completed</div></div>
                <div class="summary-card warning"><div class="value">${stats.progress}</div><div class="label">In Progress</div></div>
                <div class="summary-card"><div class="value">${stats.pending}</div><div class="label">Pending</div></div>
                <div class="summary-card"><div class="value">${stats.total}</div><div class="label">Total Actions</div></div>
            </div>

            <section>
                <h2>Team Weighted Scores</h2>
                <div class="team-grid">
                    ${teamScores.map(t => `
                        <div class="team-card ${t.m.id}">
                            <div class="team-name">${t.m.name}</div>
                            <div class="team-role">${t.m.role}</div>
                            <div class="team-score">${t.score !== null ? t.score.toFixed(2) : '-'}</div>
                            <div class="team-score-label">Weighted / 5.0</div>
                            <div class="team-tasks">
                                <span>Active <strong>${t.active}</strong></span>
                                <span>Pending <strong>${t.pending}</strong></span>
                                <span>Done <strong>${t.done}</strong></span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </section>

            <section>
                <h2>KRA Progress</h2>
                <div class="progress-section">
                    ${kraProgress.map(kp => `
                        <div class="kra-row">
                            <div>
                                <div class="kra-name">KRA ${kp.kra.kra_code.replace('kra','')}: ${escapeHtml(kp.kra.short_name)}</div>
                                <div class="kra-focus">${kp.done} / ${kp.total} actions done</div>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${kp.pct}%">${kp.pct > 10 ? kp.pct + '%' : ''}</div>
                            </div>
                            <div class="kra-percent">${kp.pct}%</div>
                        </div>
                    `).join('')}
                </div>
            </section>

            <section>
                <h2>Highlights</h2>
                <div class="highlights">
                    <div class="highlight-card done">
                        <h3>Completed</h3>
                        <ul>
                            ${completed.length
                                ? completed.map(a => `<li>${escapeHtml(a.title)}</li>`).join('')
                                : '<li>None yet</li>'
                            }
                        </ul>
                    </div>
                    <div class="highlight-card next">
                        <h3>In Progress</h3>
                        <ul>
                            ${inProgress.length
                                ? inProgress.map(a => `<li>${escapeHtml(a.title)}</li>`).join('')
                                : '<li>Nothing in progress</li>'
                            }
                        </ul>
                    </div>
                </div>
            </section>

            ${blockers.length > 0 ? `
                <section>
                    <h2>Needs Leadership Input</h2>
                    <div class="blockers-section">
                        ${blockers.map(b => `
                            <div class="blocker-row">
                                <span style="color: var(--danger); font-size: 1.25rem;">!</span>
                                <div>
                                    <div class="blocker-text">${escapeHtml(b.text)}</div>
                                    <div class="blocker-meta">${escapeHtml(b.owner)} — ${new Date(b.date).toLocaleDateString()}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            ` : ''}
        `;

        document.getElementById('last-updated').textContent =
            'Last updated: ' + new Date().toLocaleDateString();
    }

    init();
    </script>
</body>
</html>
