<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Growth & Ops Workspace</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Growth & Ops</h1>
                <p>Team Workspace</p>
            </div>

            <form id="login-form" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="off">
                </div>

                <div id="login-error" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loading" style="display: none;">Signing in...</span>
                </button>
            </form>

            <div class="login-footer">
                <p>First time? <a href="#" id="signup-link">Create account</a></p>
            </div>
        </div>

        <!-- Sign Up Modal -->
        <div id="signup-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Create Account</h2>
                    <button class="modal-close" id="close-signup">&times;</button>
                </div>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="password" required minlength="6">
                        <small>At least 6 characters</small>
                    </div>
                    <div id="signup-error" class="error-message" style="display: none;"></div>
                    <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // All-in-one login script
        const SUPABASE_URL = 'https://glheaimbqdjgpufsclrr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsaGVhaW1icWRqZ3B1ZnNjbHJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTU5MjIsImV4cCI6MjA4OTY3MTkyMn0.DJoKsXfYQtoWbro7RBJbenD0ozptBUkfwkuGIUJok4k';

        console.log('1. Script started');
        console.log('2. window.supabase:', window.supabase);

        // Create client
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('3. Client created:', client);
        console.log('4. Client.auth:', client.auth);

        // Clear inputs
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';

        // Handle form
        document.getElementById('login-form').onsubmit = async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            console.log('5. Attempting login:', email);

            btn.disabled = true;
            btn.querySelector('.btn-text').textContent = 'Signing in...';
            errorDiv.style.display = 'none';

            try {
                console.log('6. Calling signInWithPassword...');
                const { data, error } = await client.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                console.log('7. Response:', { data, error });

                if (error) {
                    errorDiv.textContent = error.message;
                    errorDiv.style.display = 'block';
                } else {
                    console.log('8. Login successful!');
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error('9. Catch error:', err);
                errorDiv.textContent = err.message || 'Connection error';
                errorDiv.style.display = 'block';
            }

            btn.disabled = false;
            btn.querySelector('.btn-text').textContent = 'Sign In';
        };
    </script>
</body>
</html>
