<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Lab Dashboard — SSEI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=3">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%2309256B'/><text x='32' y='42' font-family='Inter,sans-serif' font-size='20' font-weight='700' text-anchor='middle' fill='%23C99959' letter-spacing='1'>SSEI</text></svg>">
</head>
<body>

<div id="login-screen" class="screen">
  <div class="login-card">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="SSEI">
          <rect width="64" height="64" rx="14" fill="#09256B"/>
          <text x="32" y="42" font-family="Inter, sans-serif" font-size="20" font-weight="700"
                text-anchor="middle" fill="#C99959" letter-spacing="1">SSEI</text>
        </svg>
      </div>
      <h1>Growth Lab</h1>
      <p class="brand-sub">Internship Program</p>
      <p class="brand-tagline">Sanjay Saraf Educational Institute</p>
    </div>
    <form id="login-form">
      <label><span>Email</span><input type="email" id="login-email" autocomplete="email" required placeholder="you@ssei.co.in"></label>
      <label><span>Password</span><input type="password" id="login-password" autocomplete="current-password" required></label>
      <button type="submit" id="login-btn" class="btn-primary full">Sign in</button>
      <p id="login-error" class="error-text"></p>
    </form>
    <p class="login-foot">Forgot password? Ping Kavya or Vidyut on Slack.</p>
  </div>
</div>

<div id="picker-screen" class="screen hidden">
  <div class="picker-card">
    <h2>Who's using this account?</h2>
    <p class="picker-sub">Pick yourself so your work gets attributed correctly.</p>
    <div id="picker-list" class="picker-list"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand-mark small">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="SSEI">
          <rect width="64" height="64" rx="14" fill="#09256B"/>
          <text x="32" y="42" font-family="Inter, sans-serif" font-size="20" font-weight="700"
                text-anchor="middle" fill="#C99959" letter-spacing="1">SSEI</text>
        </svg>
      </div>
      <div>
        <div class="topbar-title">Growth Lab</div>
        <div class="topbar-sub" id="topbar-context"></div>
      </div>
    </div>
    <div class="topbar-right">
      <span id="active-user" class="active-user"></span>
      <button id="switch-intern" class="btn-ghost hidden">Switch person</button>
      <button id="bell-btn" class="bell" title="Notifications" aria-label="Notifications">🔔<span id="bell-count" class="bell-count hidden">0</span></button>
      <button id="logout-btn" class="btn-ghost">Log out</button>
      <div id="notif-panel" class="notif-panel hidden">
        <div class="notif-panel-head">
          <h4>Notifications</h4>
          <button id="notif-mark-all" class="btn-ghost" style="padding:4px 10px; font-size:11px;">Mark all read</button>
        </div>
        <div id="notif-list" class="notif-list"></div>
      </div>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>
  <main id="view-mount" class="view"></main>
</div>

<div id="modal-mount"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script src="js/config.js?v=3"></script>
<script src="js/supabase.js?v=3"></script>
<script src="js/auth.js?v=3"></script>
<script src="js/api.js?v=3"></script>
<script src="js/notifications.js?v=3"></script>
<script src="js/views/intern.js?v=3"></script>
<script src="js/views/rm.js?v=3"></script>
<script src="js/views/super.js?v=3"></script>
<script src="js/app.js?v=3"></script>

</body>
</html>
